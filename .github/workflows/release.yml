name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Prepare release asset
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "QQSpaceAutoLike-${{ github.ref_name }}.apk"
          zip -j "QQSpaceAutoLike-${{ github.ref_name }}.apk.zip" "QQSpaceAutoLike-${{ github.ref_name }}.apk"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            QQSpaceAutoLike-${{ github.ref_name }}.apk
            QQSpaceAutoLike-${{ github.ref_name }}.apk.zip
          generate_release_notes: true
          prerelease: true
